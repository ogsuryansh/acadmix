<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACADEMIX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#" class="brand">
        <img src="assets/imgs/ChatGPT Image Jul 3, 2025, 11_20_27 PM.png" alt="Logo" class="logo" />
        <span class="brand-name">ACADEMIX</span>
      </a>
      <div class="nav-menu">
        <a href="#" class="nav-item">Class 10</a>
        <a href="#" class="nav-item">Class 12</a>
        <a href="#" class="nav-item">CUET</a>
        <a href="#" class="nav-item">JEE</a>
        <a href="#" class="nav-item">NEET</a>
        <div class="user-join-mobile">
          <div class="user-icon"><i class="fas fa-user-circle"></i></div>
          <button class="join-btn">Join</button>
        </div>
      </div>
      <div class="user-join">
        <div class="user-icon"><i class="fas fa-user-circle"></i></div>
        <button class="join-btn">Join Now</button>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>

  <main>
    <section class="mainHead">
      <div class="content-wrapper">
        <div class="text-content">
          <h1>Welcome to ACADEMIX</h1>
          <p>Study smarter, not harder — get exclusive access to top-notch study materials at StudyLexus. Sign in &amp; get started!</p>
          <button class="btn-get-started">
            Get Started
            <span class="arrow"><i class="fa-solid fa-arrow-right"></i></span>
          </button>
        </div>
        <div class="image-content">
          <img src="assets/imgs/ChatGPT Image Jul 3, 2025, 11_20_27 PM.png" alt="Academix Logo" />
        </div>
      </div>
    </section>

    <div class="lable">Main Featured Materials</div>

    <!-- 📦 Dynamic Card Container -->
    <div class="cards" id="card-container">
      <!-- Cards will be injected here from backend -->
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script>
    fetch('/api/cards')
      .then(res => res.json())
      .then(cards => {
        const container = document.getElementById('card-container');
        if (!cards.length) {
          container.innerHTML = '<p>No cards found</p>';
          return;
        }

        cards.forEach(card => {
          const cardEl = document.createElement('div');
          cardEl.className = 'card';
          cardEl.innerHTML = `
            <div class="card-image">
              <img src="${card.image}" alt="${card.title}" />
              <div class="badge">${card.badge || ''}</div>
            </div>
            <div class="card-body">
              <div class="category">${card.category}</div>
              <h3 class="card-title">${card.title}</h3>
              <div class="price">
                <span class="original">₹${card.originalPrice}</span>
                <span class="discount">₹${card.discountedPrice}</span>
              </div>
              <div class="demo">${card.demo || 'No Demo'}</div>
              <a href="#" class="btn-buy">Buy Now</a>
            </div>
          `;
          container.appendChild(cardEl);
        });
      })
      .catch(err => {
        console.error('Error fetching cards:', err);
        document.getElementById('card-container').innerHTML = '<p>Error loading materials</p>';
      });
  </script>
</body>
</html>
