<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes"
    />
    <title>Acadmix eBook Reader</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f2f4f8;
        overflow: hidden;
        padding-bottom: 0;
      }

      #pdf-container {
        height: 100vh;
        overflow: auto; /* ✅ allow horizontal + vertical scroll */
        -webkit-overflow-scrolling: touch;
        box-sizing: border-box;
        padding: 20px;

        display: block; /* ✅ change from flex */
        text-align: center; /* ✅ center content initially */
      }
      .pdf-frame {
        display: inline-block;
        background: white;
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      }

      canvas {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        transition: opacity 0.3s ease;
      }
      canvas {
        display: block;
        max-width: none; /* ✅ allow width to grow with scale */
        height: auto;
      }

      canvas.fade-out {
        opacity: 0;
      }
      canvas.fade-in {
        opacity: 1;
      }
      .toolbar {
        position: fixed;
        bottom: 0px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(33, 33, 33, 0.9);
        backdrop-filter: blur(6px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        padding: 10px 14px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        flex-wrap: wrap;
      }

      .toolbar button {
        background: #444;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .toolbar button:hover {
        background: #5a5a5a;
      }

      .toolbar span {
        color: #ddd;
        font-size: 14px;
        font-weight: 500;
      }

      /* 📱 Mobile Responsive */
      @media (max-width: 500px) {
        .toolbar {
          gap: 8px;
        }

        .toolbar button {
          font-size: 10px;
        }

        .toolbar span {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body oncontextmenu="return false">
    <div id="pdf-container">
      <div class="pdf-frame">
        <canvas id="pdf-render"></canvas>
      </div>
    </div>

    <div class="toolbar">
      <button onclick="prevPage()">⬅ Prev</button>
      <span
        >Page <span id="page_num" class="highlight">1</span> of
        <span id="page_count">--</span></span
      >
      <button onclick="nextPage()">Next ➡</button>
      <button onclick="zoomOut()">➖ Zoom</button>
      <button onclick="zoomIn()">➕ Zoom</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <script src="/ebook-reader/script.js"></script>
  </body>
</html>
