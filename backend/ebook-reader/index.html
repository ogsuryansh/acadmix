<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes" />
  <title>Acadmix eBook Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --primary-light: #3b82f6;
      --background: #f2f4f8;
      --card-bg: #fff;
      --shadow: 0 4px 16px rgba(37, 99, 235, 0.08);
      --border-radius: 16px;
    }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--background);
      overflow: hidden;
      padding-bottom: 0;
    }
    #pdf-container {
      height: 100vh;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
      padding: 20px;
      display: block;
      text-align: center;
    }
    .pdf-frame {
      display: inline-block;
      background: var(--card-bg);
      padding: 10px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s;
      position: relative;
      min-width: 0;
    }
    canvas {
      display: block;
      border-radius: 8px;
      transition: opacity 0.3s, box-shadow 0.3s;
      background: #fff;
      box-shadow: 0 2px 12px #2563eb22;
      margin: 0 auto;
    }
    /* Page turn effect */
    .turning {
      animation: pageTurn 0.5s;
    }
    @keyframes pageTurn {
      0% {
        transform: rotateY(0deg) scale(1);
        box-shadow: 0 2px 12px #2563eb22;
        opacity: 1;
      }
      40% {
        transform: rotateY(-30deg) scale(0.98);
        box-shadow: 0 8px 24px #2563eb44;
        opacity: 0.7;
      }
      100% {
        transform: rotateY(0deg) scale(1);
        box-shadow: 0 2px 12px #2563eb22;
        opacity: 1;
      }
    }
    .toolbar {
      position: fixed;
      bottom: 0px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      box-shadow: 0 5px 15px rgba(37, 99, 235, 0.13);
      padding: 10px 16px;
      border-radius: 18px 18px 0 0;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 9999;
      flex-wrap: wrap;
      min-width: 260px;
    }
    .toolbar button {
      background: var(--primary-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 15px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px #2563eb22;
      letter-spacing: 0.5px;
    }
    .toolbar button:hover {
      background: var(--primary-light);
      color: #fff;
      transform: translateY(-2px) scale(1.04);
    }
    .toolbar span {
      color: #e0e7ff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    /* Mobile Responsive */
    @media (max-width: 600px) {
      #pdf-container {
        padding: 6px;
      }
      .toolbar {
        gap: 7px;
        width: 98vw !important;
        min-width: 0;
        left: 1vw;
        transform: none;
        border-radius: 12px 12px 0 0;
        padding: 7px 2px;
      }
      .toolbar button {
        font-size: 12px;
        padding: 6px 8px;
      }
      .toolbar span {
        font-size: 13px;
      }
      .pdf-frame {
        padding: 4px;
        border-radius: 10px;
        max-width: 100vw;
        overflow-x: auto;
      }
      canvas {
        border-radius: 5px;
        width: auto !important;
        min-width: 100vw !important;
        max-width: none !important;
        height: auto !important;
        display: block;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">
  <div id="pdf-container">
    <div class="pdf-frame">
      <canvas id="pdf-render"></canvas>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-prev">⬅ Prev</button>
    <span>
      Page <span id="page_num" class="highlight">1</span> of
      <span id="page_count">--</span>
    </span>
    <button class="btn-next">Next ➡</button>
    <button class="btn-zoom-out">➖ Zoom</button>
    <button class="btn-zoom-in">➕ Zoom</button>
    <button class="btn-fit-width">↔️ Fit Width</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
  <script src="/reader-assets/script.js"></script>
</body>
</html>
